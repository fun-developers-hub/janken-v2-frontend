name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # ESLint でコード規約に違反していないかチェックする
      - name: Lint
        run: pnpm run lint

      # Prettier で整形済みかチェックする（未整形なら失敗）
      - name: Format
        run: pnpm run format:check

      # Next.js のビルドと型チェックが通るか確認する
      - name: Build
        run: pnpm run build
